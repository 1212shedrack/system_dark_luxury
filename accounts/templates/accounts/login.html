<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopOS</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #080808;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', system-ui, sans-serif;
    padding: 1rem;
  }

  /* Subtle background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
  }

  /* Glow blob */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(196,164,93,.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    position: relative;
    width: 100%;
    max-width: 420px;
    background: #111;
    border: 1px solid #222;
    border-radius: 20px;
    padding: 48px 40px 40px;
    box-shadow: 0 0 0 1px rgba(196,164,93,.08), 0 32px 64px rgba(0,0,0,.6);
  }

  /* Gold top accent line */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 40px; right: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c4a45d, transparent);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
    
  }

  .brand-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #c4a45d, #8a6d35);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }

  .brand-icon svg { color: #0a0a0a; }

  .brand-name {
    font-size: 18px;
    font-weight: 600;
    color: #e8e0cc;
    letter-spacing: .02em;
  }

  h1 {
    font-size: 24px;
    font-weight: 600;
    color: #f0ece0;
    margin-bottom: 6px;
    letter-spacing: -.01em;
  }

  .subtitle {
    font-size: 13px;
    color: #555;
    margin-bottom: 32px;
    line-height: 1.5;
  }

  /* Role hint pills */
  .role-hints {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .role-hint {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid;
    cursor: default;
    letter-spacing: .02em;
  }

  .role-hint.admin    { border-color: #c4a45d44; color: #c4a45d; background: #c4a45d0d; }
  .role-hint.cashier  { border-color: #5d8fc444; color: #7ab3e0; background: #5d8fc40d; }
  .role-hint.customer { border-color: #5dc4a444; color: #6ecfb2; background: #5dc4a40d; }

  /* Detected role badge */
  .detected-role {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 16px;
    border: 1px solid;
    transition: all .2s;
  }

  .detected-role.show { display: flex; }
  .detected-role.admin    { background: #c4a45d0d; border-color: #c4a45d33; color: #c4a45d; }
  .detected-role.cashier  { background: #5d8fc40d; border-color: #5d8fc433; color: #7ab3e0; }
  .detected-role.customer { background: #5dc4a40d; border-color: #5dc4a433; color: #6ecfb2; }

  .detected-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .field { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: #666;
    margin-bottom: 8px;
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 14px;
    color: #444;
    display: flex;
    align-items: center;
    pointer-events: none;
    transition: color .2s;
  }

  input[type="text"],
  input[type="password"],
  input[type="email"] {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 13px 14px 13px 42px;
    font-size: 14px;
    color: #e8e0cc;
    font-family: inherit;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }

  input:focus {
    border-color: #c4a45d55;
    box-shadow: 0 0 0 3px #c4a45d11;
  }

  input:focus + .input-icon,
  .input-wrap:focus-within .input-icon {
    color: #c4a45d;
  }

  /* Override icon position — icon is before input in DOM but visually left */
  .input-wrap input { order: 1; }
  .input-wrap .input-icon { order: 0; }

  .toggle-password {
    position: absolute;
    right: 14px;
    background: none;
    border: none;
    cursor: pointer;
    color: #444;
    display: flex;
    align-items: center;
    padding: 0;
    transition: color .2s;
    z-index: 1;
  }

  .toggle-password:hover { color: #c4a45d; }

  .error-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #2a0f0f;
    border: 1px solid #5a1a1a;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 20px;
    font-size: 13px;
    color: #e07070;
  }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #c4a45d, #8a6d35);
    color: #0a0a0a;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: .02em;
    transition: opacity .2s, transform .1s;
    margin-top: 8px;
  }

  .btn-login:hover  { opacity: .9; }
  .btn-login:active { transform: scale(.99); }

  .footer-links {
    display: flex;
    justify-content: space-between;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #1a1a1a;
  }

  .footer-links a {
    font-size: 12px;
    color: #555;
    text-decoration: none;
    transition: color .2s;
  }

  .footer-links a:hover { color: #c4a45d; }

  /* Credential guide */
  .cred-guide {
    margin-top: 24px;
    padding: 14px;
    background: #0d0d0d;
    border: 1px solid #1a1a1a;
    border-radius: 10px;
  }

  .cred-guide-title {
    font-size: 11px;
    color: #444;
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 10px;
  }

  .cred-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 7px;
    font-size: 12px;
  }

  .cred-row:last-child { margin-bottom: 0; }

  .cred-label {
    width: 64px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .cred-label.admin    { color: #c4a45d; }
  .cred-label.cashier  { color: #7ab3e0; }
  .cred-label.customer { color: #6ecfb2; }

  .cred-example { color: #444; font-family: 'DM Mono', monospace; font-size: 11px; }
</style>
</head>
<body>

<div class="card">

  <div class="brand">
    <div class="brand-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    </div>
    <span class="brand-name">ShopOS</span>
  </div>

  <h1>Welcome back</h1>
  <p class="subtitle">Sign in with your credentials below.
    </p>

  <!-- <div class="role-hints">
    <span class="role-hint admin">Admin — email</span>
    <span class="role-hint cashier">Cashier — staff no.</span>
    <span class="role-hint customer">Customer — username</span>
  </div>

   Detected role badge (shown as user types) -->

  <!-- <div class="detected-role" id="detected-role">
    <span class="detected-dot"></span>
    <span id="detected-text">—</span>
  </div> --> 

  {% if error %}
  <div class="error-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    {{ error }}
  </div>
  {% endif %}

  <form method="POST" autocomplete="off">
    {% csrf_token %}

    <div class="field">
      <label for="identifier">Username</label>
      <div class="input-wrap">
        <input type="text" id="identifier" name="identifier"
               placeholder="Username"
               value="{{ request.POST.identifier|default:'' }}"
               autocomplete="off" autofocus>
        <span class="input-icon" id="id-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </span>
      </div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" name="password" placeholder="Enter your password">
        <span class="input-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </span>
        <button type="button" class="toggle-password" onclick="togglePwd(this)" tabindex="-1">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-open"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-closed" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn-login">Sign in</button>
  </form>

  <div class="footer-links">
    <a href="{% url 'register' %}">Create account</a>
    <a href="{% url 'forgot_password' %}">Forgot password?</a>
  </div>

  <!-- <div class="cred-guide">
    <div class="cred-guide-title">Credential guide</div>
    <div class="cred-row">
      <span class="cred-label admin">Admin</span>
      <span class="cred-example">john@shopname.com</span>
    </div>
    <div class="cred-row">
      <span class="cred-label cashier">Cashier</span>
      <span class="cred-example">786557</span>
    </div>
    <div class="cred-row">
      <span class="cred-label customer">Customer</span>
      <span class="cred-example">john_doe</span>
    </div>
  </div> -->

</div>

<script>
const input     = document.getElementById('identifier');
const badge     = document.getElementById('detected-role');
const badgeText = document.getElementById('detected-text');
const icon      = document.getElementById('id-icon');

const ICONS = {
  admin: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
  cashier: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>`,
  customer: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
  default: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
};

function detectRole(val) {
  if (!val) return null;
  if (val.includes('@')) return 'admin';
  if (/^\d+$/.test(val)) return 'cashier';
  if (val.length > 1) return 'customer';
  return null;
}

input.addEventListener('input', function () {
  const role = detectRole(this.value.trim());

  badge.className = 'detected-role';
  if (role) {
    badge.classList.add('show', role);
    badgeText.textContent = {
      admin:    'Admin detected — sign in with email',
      cashier:  'Cashier detected — sign in with staff number',
      customer: 'Customer detected — sign in with username',
    }[role];
    icon.innerHTML = ICONS[role];
  } else {
    badgeText.textContent = '—';
    icon.innerHTML = ICONS.default;
  }
});

function togglePwd(btn) {
  const pwd    = document.getElementById('password');
  const isText = pwd.type === 'text';
  pwd.type     = isText ? 'password' : 'text';
  btn.querySelector('.eye-open').style.display  = isText ? 'block' : 'none';
  btn.querySelector('.eye-closed').style.display = isText ? 'none'  : 'block';
}
</script>
</body>
</html>

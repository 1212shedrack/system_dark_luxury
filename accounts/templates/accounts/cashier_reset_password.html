{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset Password — {{ cashier.username }}</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="{% static 'accounts/css/manage.css' %}">
</head>
<body>
<div class="form-wrap">

  <div class="form-header">
    <a href="{% url 'cashier_list' %}" class="back-link">
      <i class="fa fa-arrow-left"></i> Back to cashiers
    </a>
    <h1 class="form-title">Reset password</h1>
    <p class="form-sub">
      Resetting password for
      <strong>{{ cashier.username }}</strong>
      (Staff no. {{ cashier.staff_number }})
    </p>
  </div>

  {% if error %}
  <div class="alert alert-error">
    <i class="fa fa-circle-exclamation"></i> {{ error }}
  </div>
  {% endif %}

  <div class="form-card">
    <form method="POST">
      {% csrf_token %}

      <div class="field">
        <label>New password <span class="required">*</span></label>
        <div class="input-wrap">
          <input type="password" name="password"
                 id="password" placeholder="Min. 6 characters" required>
          <button type="button" class="toggle-pwd"
                  onclick="togglePwd('password', this)">
            <i class="fa fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="field" style="margin-top:14px">
        <label>Confirm password <span class="required">*</span></label>
        <div class="input-wrap">
          <input type="password" name="password2"
                 id="password2" placeholder="Repeat password" required>
          <button type="button" class="toggle-pwd"
                  onclick="togglePwd('password2', this)">
            <i class="fa fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="form-footer" style="margin-top:20px">
        <a href="{% url 'cashier_list' %}" class="btn btn-outline">
          Cancel
        </a>
        <button type="submit" class="btn btn-gold">
          <i class="fa fa-key"></i> Reset password
        </button>
      </div>

    </form>
  </div>
</div>

<script>
function togglePwd(id, btn) {
  const inp = document.getElementById(id);
  inp.type  = inp.type === 'text' ? 'password' : 'text';
  btn.querySelector('i').className =
    inp.type === 'text' ? 'fa fa-eye-slash' : 'fa fa-eye';
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — ShopOS</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh; background: #0a0a0a;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Sans', system-ui, sans-serif; padding: 1rem;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
    background-size: 48px 48px; pointer-events: none;
  }
  .card {
    position: relative; width: 100%; max-width: 420px;
    background: #111; border: 1px solid #222; border-radius: 20px;
    padding: 48px 40px 40px;
    box-shadow: 0 0 0 1px rgba(196,164,93,.08), 0 32px 64px rgba(0,0,0,.6);
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 40px; right: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, #c4a45d, transparent);
  }
  h1 { font-size: 22px; font-weight: 600; color: #f0ece0; margin-bottom: 8px; }
  .subtitle { font-size: 13px; color: #555; margin-bottom: 28px; line-height: 1.6; }
  label { display: block; font-size: 12px; font-weight: 500; color: #666; margin-bottom: 8px; letter-spacing: .04em; text-transform: uppercase; }
  .field { margin-bottom: 16px; }
  .input-wrap { position: relative; display: flex; align-items: center; }
  .input-icon { position: absolute; left: 14px; color: #444; display: flex; align-items: center; pointer-events: none; }
  input[type="password"] {
    width: 100%; background: #0d0d0d; border: 1px solid #222; border-radius: 10px;
    padding: 13px 42px 13px 42px; font-size: 14px; color: #e8e0cc;
    font-family: inherit; outline: none; transition: border-color .2s, box-shadow .2s;
  }
  input:focus { border-color: #c4a45d55; box-shadow: 0 0 0 3px #c4a45d11; }
  .toggle-password {
    position: absolute; right: 14px; background: none; border: none;
    cursor: pointer; color: #444; display: flex; align-items: center; padding: 0; transition: color .2s;
  }
  .toggle-password:hover { color: #c4a45d; }
  .strength-bar { height: 3px; background: #1a1a1a; border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .strength-fill { height: 100%; border-radius: 2px; width: 0; transition: width .3s, background .3s; }
  .strength-label { font-size: 11px; color: #555; margin-top: 4px; }
  .btn {
    width: 100%; padding: 14px; margin-top: 8px;
    background: linear-gradient(135deg, #c4a45d, #8a6d35);
    color: #0a0a0a; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: opacity .2s;
  }
  .btn:hover { opacity: .9; }
  .btn-outline {
    width: 100%; padding: 13px; margin-top: 10px;
    background: transparent; color: #c4a45d;
    border: 1px solid #c4a45d33; border-radius: 10px;
    font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; transition: background .2s;
    text-decoration: none; display: block; text-align: center;
  }
  .btn-outline:hover { background: #c4a45d11; }
  .msg-box {
    display: flex; align-items: flex-start; gap: 8px;
    border-radius: 10px; padding: 12px 14px; margin-bottom: 20px; font-size: 13px;
  }
  .msg-success { background: #0f2a1a; border: 1px solid #1a5a30; color: #6ecfb2; }
  .msg-error   { background: #2a0f0f; border: 1px solid #5a1a1a; color: #e07070; }
</style>
</head>
<body>
<div class="card">
  <h1>Set new password</h1>
  <p class="subtitle">Choose a strong password for your account.</p>

  {% if error %}
  <div class="msg-box msg-error">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    {{ error }}
  </div>
  {% endif %}

  {% if success %}
  <div class="msg-box msg-success">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 11.01 9 8.01"/></svg>
    {{ success }}
  </div>
  <a href="{% url 'login' %}" class="btn-outline">Go to login</a>

  {% elif not invalid %}
  <form method="POST">
    {% csrf_token %}
    <div class="field">
      <label for="password1">New password</label>
      <div class="input-wrap">
        <input type="password" id="password1" name="password1" placeholder="Min. 8 characters" oninput="checkStrength(this.value)" autofocus>
        <span class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span>
        <button type="button" class="toggle-password" onclick="togglePwd('password1', this)" tabindex="-1">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="strength-label" id="strength-label">Enter a password</div>
    </div>

    <div class="field">
      <label for="password2">Confirm password</label>
      <div class="input-wrap">
        <input type="password" id="password2" name="password2" placeholder="Repeat password">
        <span class="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span>
      </div>
    </div>

    <button type="submit" class="btn">Update password</button>
  </form>
  {% endif %}
</div>

<script>
function checkStrength(val) {
  const fill  = document.getElementById('strength-fill');
  const label = document.getElementById('strength-label');
  let score = 0;
  if (val.length >= 8)               score++;
  if (/[A-Z]/.test(val))             score++;
  if (/[0-9]/.test(val))             score++;
  if (/[^A-Za-z0-9]/.test(val))      score++;
  const levels = [
    { w: '0%',   bg: 'transparent', txt: 'Enter a password' },
    { w: '25%',  bg: '#c0392b',     txt: 'Weak' },
    { w: '50%',  bg: '#e67e22',     txt: 'Fair' },
    { w: '75%',  bg: '#c4a45d',     txt: 'Good' },
    { w: '100%', bg: '#6ecfb2',     txt: 'Strong' },
  ];
  fill.style.width      = levels[score].w;
  fill.style.background = levels[score].bg;
  label.textContent     = levels[score].txt;
  label.style.color     = levels[score].bg;
}

function togglePwd(id, btn) {
  const inp = document.getElementById(id);
  inp.type  = inp.type === 'text' ? 'password' : 'text';
}
</script>
</body>
</html>

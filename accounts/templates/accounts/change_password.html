{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Change Password — ShopOS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="{% static 'accounts/css/manage.css' %}">
<link rel="stylesheet" href="{% static 'accounts/css/settings.css' %}">
</head>
<body>
<div class="settings-wrap">

  <div class="form-header">
    <a href="{% url 'shop_settings' %}" class="back-link">
      <i class="fa fa-arrow-left"></i> Back to settings
    </a>
    <h1 class="form-title">Change password</h1>
    <p class="form-sub">Update your admin account password</p>
  </div>

  {% if success %}
  <div class="alert alert-success">
    <i class="fa fa-circle-check"></i> {{ success }}
  </div>
  {% endif %}

  {% if error %}
  <div class="alert alert-error">
    <i class="fa fa-circle-exclamation"></i> {{ error }}
  </div>
  {% endif %}

  <div class="form-card" style="max-width:480px">
    <form method="POST">
      {% csrf_token %}

      <div class="field" style="margin-bottom:14px">
        <label>Current password <span class="required">*</span></label>
        <div class="input-wrap">
          <input type="password" name="current_password"
                 id="pwd0" placeholder="Enter current password" required>
          <button type="button" class="toggle-pwd"
                  onclick="togglePwd('pwd0',this)">
            <i class="fa fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="field" style="margin-bottom:14px">
        <label>New password <span class="required">*</span></label>
        <div class="input-wrap">
          <input type="password" name="new_password"
                 id="pwd1" placeholder="Min. 6 characters" required>
          <button type="button" class="toggle-pwd"
                  onclick="togglePwd('pwd1',this)">
            <i class="fa fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="field" style="margin-bottom:20px">
        <label>Confirm new password <span class="required">*</span></label>
        <div class="input-wrap">
          <input type="password" name="confirm_password"
                 id="pwd2" placeholder="Repeat new password" required>
          <button type="button" class="toggle-pwd"
                  onclick="togglePwd('pwd2',this)">
            <i class="fa fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="form-footer">
        <a href="{% url 'shop_settings' %}" class="btn btn-outline">
          Cancel
        </a>
        <button type="submit" class="btn btn-gold">
          <i class="fa fa-key"></i> Update password
        </button>
      </div>

    </form>
  </div>

</div>

<script>
function togglePwd(id, btn) {
  const inp = document.getElementById(id);
  inp.type  = inp.type === 'text' ? 'password' : 'text';
  btn.querySelector('i').className =
    inp.type === 'text' ? 'fa fa-eye-slash' : 'fa fa-eye';
}
</script>
</body>
</html>
